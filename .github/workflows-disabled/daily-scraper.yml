name: Daily Hotel Promotion Scraper

on:
  schedule:
    # Runs at 19:00 UTC (04:00 KST) every day
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci || npm install
        
      # Install Puppeteer browsers
      - name: Install Puppeteer Browsers
        run: npx puppeteer browsers install chrome

      # Run the scraper and cleanup pipeline
      - name: Run Scraper Pipeline
        run: node scripts/pipeline.js
        
      # Commit and push changes if hotels.json was updated
      - name: Commit and Push changes
        run: |
          git config --global user.name "HotelDoc-Scraper-Bot"
          git config --global user.email "bot@hoteldockorea.com"
          git add public/data/hotels.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Daily Promotions Filtered & Appended"
          git push origin HEAD
